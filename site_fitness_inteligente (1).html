<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plataforma Fitness Inteligente</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f7}
header{background:#16a34a;color:white;padding:25px;text-align:center}
.container{max-width:1100px;margin:auto;padding:25px}
.card{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.08);margin-bottom:25px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
input,select{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc}
button{background:#16a34a;color:white;border:none;padding:14px;font-size:16px;border-radius:6px;width:100%;cursor:pointer}
button:hover{background:#12813b}
img{width:100%;border-radius:10px;margin-top:10px}
iframe{width:100%;height:300px;border:none;border-radius:10px;margin-top:10px}
.result-title{color:#16a34a}
.badge{display:inline-block;background:#16a34a;color:white;padding:4px 10px;border-radius:20px;font-size:12px;margin-left:10px}
.hidden{display:none}
.progress-item{padding:6px;border-bottom:1px solid #eee}
</style>
</head>
<body>

<header>
<h1>Fitness Inteligente</h1>
<p>Plataforma automática de dieta e treino</p>
</header>

<div class="container">

<div class="card" id="loginCard">
<h2>Entrar ou Criar Conta</h2>
<input type="text" id="nome" placeholder="Seu nome" />
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">

<div class="card">
<h2>Perfil Fitness</h2>

<label>Idade</label>
<input type="number" id="idade" />

<label>Peso (kg)</label>
<input type="number" id="peso" />

<label>Altura (cm)</label>
<input type="number" id="altura" />

<label>Objetivo</label>
<select id="objetivo">
<option value="emagrecer">Emagrecer</option>
<option value="manter">Manter forma</option>
<option value="ganhar">Ganhar massa</option>
</select>

<button onclick="gerarPlano()">Gerar Plano Inteligente</button>
</div>

<div id="resultado"></div>

<div class="card">
<h2>Calculadora de Calorias</h2>
<button onclick="calcularCalorias()">Calcular Necessidade Calórica</button>
<p id="calorias"></p>
</div>

<div class="card">
<h2>Registrar Progresso de Peso</h2>
<input type="number" id="pesoRegistro" placeholder="Peso atual" />
<button onclick="salvarProgresso()">Salvar progresso</button>
<div id="historico"></div>
</div>

</div>

</div>

<script>

function login(){
let nome = document.getElementById("nome").value
if(!nome){
alert("Digite seu nome")
return
}
localStorage.setItem("usuarioFitness", nome)
document.getElementById("loginCard").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")
carregarHistorico()
}

function gerarPlano(){

let idade = document.getElementById("idade").value
let peso = document.getElementById("peso").value
let altura = document.getElementById("altura").value
let objetivo = document.getElementById("objetivo").value

let imc = peso / ((altura/100)*(altura/100))

let dieta = ""
let treino = ""

if(objetivo === "emagrecer"){

dieta=`
<div class="card">
<h2 class="result-title">Dieta para Emagrecimento</h2>
<ul>
<li>Café: Omelete + fruta</li>
<li>Almoço: Frango grelhado + salada</li>
<li>Lanche: Iogurte natural</li>
<li>Jantar: Salada + proteína</li>
</ul>
<img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352"/>
</div>`

treino=`
<div class="card">
<h2 class="result-title">Treino Queima Gordura</h2>
<ul>
<li>HIIT 20 min</li>
<li>Polichinelo</li>
<li>Burpee</li>
<li>Corrida 30 min</li>
</ul>
<iframe src="https://www.youtube.com/embed/ml6cT4AZdqI"></iframe>
</div>`
}

if(objetivo === "manter"){

dieta=`
<div class="card">
<h2 class="result-title">Dieta Manutenção</h2>
<ul>
<li>Café: Panqueca de banana</li>
<li>Almoço: Frango + arroz integral</li>
<li>Lanche: Iogurte + frutas</li>
<li>Jantar: Omelete + salada</li>
</ul>
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c"/>
</div>`

treino=`
<div class="card">
<h2 class="result-title">Treino Fitness</h2>
<ul>
<li>Treino funcional</li>
<li>Abdominal</li>
<li>Corrida</li>
</ul>
<iframe src="https://www.youtube.com/embed/U0bhE67HuDY"></iframe>
</div>`
}

if(objetivo === "ganhar"){

dieta=`
<div class="card">
<h2 class="result-title">Dieta Hipertrofia</h2>
<ul>
<li>Café: Ovos + pão integral</li>
<li>Lanche: Vitamina banana + aveia</li>
<li>Almoço: Carne + arroz + batata</li>
<li>Jantar: Proteína + legumes</li>
</ul>
<img src="https://images.unsplash.com/photo-1604908176997-431c9e0c7c6f"/>
</div>`

treino=`
<div class="card">
<h2 class="result-title">Treino Hipertrofia</h2>
<ul>
<li>Musculação 5x semana</li>
<li>Agachamento</li>
<li>Supino</li>
<li>Levantamento terra</li>
</ul>
<iframe src="https://www.youtube.com/embed/2tM1LFFxeKg"></iframe>
</div>`
}

let resultadoHTML=`
<div class="card">
<h2>Resultado</h2>
<p><b>IMC:</b> ${imc.toFixed(2)}</p>
</div>
${dieta}
${treino}`

document.getElementById("resultado").innerHTML = resultadoHTML

}

function calcularCalorias(){

let peso = document.getElementById("peso").value
let altura = document.getElementById("altura").value
let idade = document.getElementById("idade").value

let calorias = 10*peso + 6.25*altura - 5*idade + 5

document.getElementById("calorias").innerText =
"Necessidade aproximada: " + Math.round(calorias) + " kcal por dia"
}

function salvarProgresso(){
let peso = document.getElementById("pesoRegistro").value

let historico = JSON.parse(localStorage.getItem("historicoPeso") || "[]")

historico.push({
 data:new Date().toLocaleDateString(),
 peso:peso
})

localStorage.setItem("historicoPeso", JSON.stringify(historico))

carregarHistorico()
}

function carregarHistorico(){

let historico = JSON.parse(localStorage.getItem("historicoPeso") || "[]")

let html=""

historico.forEach(item=>{
html+=`<div class="progress-item">${item.data} - ${item.peso} kg</div>`
})

document.getElementById("historico").innerHTML = html

}

</script>

</body>
</html>
